# ~/.tmux.conf

# --- プレフィックスキー ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- 基本設定 ---
set -g mouse on                  # マウス操作を有効化
set -g base-index 1              # ウィンドウのインデックスを 1 始まりに
setw -g pane-base-index 1        # ペインのインデックスを 1 始まりに
set -g renumber-windows on       # ウィンドウを削除したとき番号を詰める
set -g automatic-rename on       # ウィンドウ名を自動リネーム
set -g history-limit 50000       # スクロールバッファを拡張
set -g display-time 2000         # メッセージ表示時間 (ms)
set -g escape-time 10            # ESC キーのラグを減らす
set -sg repeat-time 600          # キーリピートの間隔

# --- ターミナル ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"  # True Color 対応

# --- ペイン分割 ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- C-hjkl でペイン移動（nvim内ではnvimに転送、それ以外はtmuxが処理） ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
# C-j が効かない環境用の代替（C-a j）
bind-key -T prefix j select-pane -D
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# --- hjkl でペインリサイズ (大文字) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- ウィンドウ移動 ---
bind -r p previous-window
bind -r n next-window

# --- 設定のリロード ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- コピーモード (vi キーバインド) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# --- ステータスバー ---
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# 左: セッション名
set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

# 右: 日時
set -g status-right-length 50
set -g status-right "#[fg=#6c7086]│ #[fg=#a6e3a1]%Y-%m-%d #[fg=#89b4fa]%H:%M "

# ウィンドウタブ
setw -g window-status-style "fg=#6c7086,bg=#1e1e2e"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
setw -g window-status-current-format " #I:#W "

# ペインボーダー
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
