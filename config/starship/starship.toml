add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$docker_context\
$python\
$nodejs\
$rust\
$cmd_duration\
$line_break\
$character
"""

# -------------------------------
# directory
# -------------------------------
[directory]
truncation_length = 3
truncate_to_repo = true
style = "blue bold"

# -------------------------------
# git
# -------------------------------
[git_branch]
symbol = " "
style = "purple bold"

[git_status]
style = "red bold"
format = '([\[$all_status$ahead_behind\]]($style) )'

# -------------------------------
# docker
# -------------------------------
[docker_context]
format = "via [🐳 $context](blue) "
only_with_files = true

# -------------------------------
# python
# -------------------------------
[python]
format = "via [🐍 $version](yellow bold) "
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]
detect_folders = ["venv", ".venv"]

# -------------------------------
# node
# -------------------------------
[nodejs]
format = "via [⬢ $version](green bold) "
detect_files = ["package.json", ".node-version", "pnpm-lock.yaml", "yarn.lock"]

# -------------------------------
# rust
# -------------------------------
[rust]
symbol = "🦀 "
format = "via [$symbol$version](red bold) "
detect_files = ["Cargo.toml"]

# -------------------------------
# command duration
# -------------------------------
[cmd_duration]
min_time = 500
format = "⏱ [$duration]($style) "
style = "yellow"

# -------------------------------
# character
# -------------------------------
[character]
success_symbol = "[❯](green bold)"
error_symbol = "[❯](red bold)"